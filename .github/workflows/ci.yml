name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality-gates:
    name: Python quality gates
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[api,observability]"
          python -m pip install build dvc>=3.0

      - name: Install lint and type tooling
        run: python -m pip install ruff mypy

      - name: Lint with ruff
        run: ruff check src tests

      - name: Type check with mypy
        run: mypy src/f1_strategy --ignore-missing-imports --check-untyped-defs --warn-redundant-casts

      - name: Compile source
        run: python -m compileall -q src tests

      - name: Run unit and system tests
        run: python -m unittest discover -s tests

      - name: Run model regression gates
        run: python -m f1_strategy.regression

      - name: Run replay and report gates
        run: |
          python -m f1_strategy.replay --dataset examples/replay_telemetry.csv
          python -m f1_strategy.replay --suite
          python -m f1_strategy.replay --check-benchmark-manifests
          python -m f1_strategy.replay --benchmark
          python -m f1_strategy.evaluation --format json --output reports/model-evaluation.json
          python -m f1_strategy.evaluation --format markdown --output reports/model-evaluation.md

      - name: DVC metrics diff
        if: ${{ hashFiles('dvc.lock') != '' }}
        run: |
          dvc metrics show --md >> $GITHUB_STEP_SUMMARY || true
          dvc metrics diff --md >> $GITHUB_STEP_SUMMARY || true

      - name: Inference latency benchmark
        run: |
          python - <<'PY'
          import time
          from f1_strategy.engine import InferenceEngine
          from f1_strategy.simulation import RaceSimulator, SimulationConfig

          engine = InferenceEngine()
          event = RaceSimulator(SimulationConfig(laps=1, seed=42)).events()[-1]

          # Warmup: ensure JIT / import paths are hot before measuring.
          for _ in range(20):
              engine.ingest(event)

          times_ms = []
          for _ in range(1000):
              t0 = time.perf_counter()
              engine.ingest(event)
              times_ms.append((time.perf_counter() - t0) * 1000.0)

          times_ms.sort()
          p50 = times_ms[499]
          p95 = times_ms[949]
          p99 = times_ms[989]
          print(f"Inference latency — p50={p50:.2f}ms  p95={p95:.2f}ms  p99={p99:.2f}ms")

          TARGET_P99_MS = 50.0
          assert p99 < TARGET_P99_MS, (
              f"Latency gate failed: p99={p99:.2f}ms exceeds {TARGET_P99_MS}ms budget"
          )
          print("Latency gate passed.")
          PY

      - name: Verify CLI startup
        run: |
          python -m f1_strategy.cli --version
          python -m f1_strategy.cli --laps 1

      - name: Build package
        run: python -m build

      - name: Upload evaluation reports
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-reports-${{ matrix.python-version }}
          path: reports/

  docker-gate:
    name: Docker build gate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build API image
        run: |
          docker build \
            --build-arg F1_BUILD_SHA="${GITHUB_SHA}" \
            --build-arg F1_BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t f1-tire-energy-strategy:${GITHUB_SHA} .

  xgboost-gate:
    name: Optional tree model serving gates
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ML dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[ml]"

      - name: Train and register XGBoost artifact
        run: |
          python -m f1_strategy.training \
            --backend xgboost \
            --seeds 8 --laps 8 --rounds 24 \
            --artifact-root /tmp/ci-artifacts \
            --output models/xgboost_lap_delta.json

      - name: Verify XGBoost serving backend
        env:
          F1_MODEL_BACKEND: xgboost
          F1_XGBOOST_MODEL_PATH: models/xgboost_lap_delta.json
        run: |
          python -m f1_strategy.cli --laps 2
          python -m f1_strategy.regression
          python -m f1_strategy.replay --suite
          python -m f1_strategy.replay --benchmark
          python - <<'PY'
          from f1_strategy.engine import InferenceEngine

          engine = InferenceEngine()
          assert getattr(engine.model, "backend_name", None) == "xgboost"
          print(type(engine.model).__name__)
          PY

      - name: Verify feature importance is saved alongside XGBoost model
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from f1_strategy.engine import InferenceEngine

          importance_path = Path("models/xgboost_lap_delta.json.importance.json")
          assert importance_path.exists(), f"Feature importance file missing: {importance_path}"
          importance = json.loads(importance_path.read_text())
          assert isinstance(importance, dict), "Importance should be a dict"
          assert len(importance) > 0, "Importance dict is empty"
          print(f"Feature importance: {len(importance)} features, top: {sorted(importance, key=lambda k: -importance[k])[:3]}")

          engine = InferenceEngine()
          fi = engine.feature_importance()
          assert isinstance(fi, dict) and len(fi) > 0, f"engine.feature_importance() returned: {fi}"
          print("feature_importance() check passed.")
          PY

      - name: Train and register LightGBM artifact
        run: |
          python -m f1_strategy.training \
            --backend lightgbm \
            --seeds 8 --laps 8 --rounds 24 \
            --artifact-root /tmp/ci-artifacts \
            --output models/lightgbm_lap_delta.txt

      - name: Verify LightGBM serving backend
        env:
          F1_MODEL_BACKEND: lightgbm
          F1_LIGHTGBM_MODEL_PATH: models/lightgbm_lap_delta.txt
        run: |
          python -m f1_strategy.cli --laps 2
          python -m f1_strategy.regression
          python -m f1_strategy.replay --suite
          python -m f1_strategy.replay --benchmark

  kalman-gate:
    name: Kalman serving gate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Verify Kalman backend
        env:
          F1_MODEL_BACKEND: kalman
        run: |
          python -m f1_strategy.cli --laps 2
          python -m f1_strategy.regression
          python -m f1_strategy.replay --suite
          python -m f1_strategy.replay --benchmark

  extended-model-gate:
    name: Extended optional model gates
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install extended model dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[catboost,online,deep]"

      - name: Train and register CatBoost artifact
        run: |
          python -m f1_strategy.training \
            --backend catboost \
            --seeds 8 --laps 8 --rounds 24 \
            --artifact-root /tmp/ci-artifacts \
            --output models/catboost_lap_delta.cbm

      - name: Verify CatBoost serving backend
        env:
          F1_MODEL_BACKEND: catboost
          F1_CATBOOST_MODEL_PATH: models/catboost_lap_delta.cbm
        run: python -m f1_strategy.regression

      - name: Verify River online backend
        env:
          F1_MODEL_BACKEND: river
        run: python -m f1_strategy.regression

      - name: Train Torch sequence artifact
        run: python -m f1_strategy.training --backend sequence --seeds 8 --laps 8 --rounds 24 --output models/sequence_lap_delta.pt

      - name: Verify LSTM/TFT TorchScript backend
        env:
          F1_MODEL_BACKEND: tft
          F1_SEQUENCE_MODEL_PATH: models/sequence_lap_delta.pt
        run: python -m f1_strategy.regression
