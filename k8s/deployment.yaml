apiVersion: apps/v1
kind: Deployment
metadata:
  name: f1-strategy-api
  namespace: f1-strategy
  labels:
    app: f1-strategy-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: f1-strategy-api
  template:
    metadata:
      labels:
        app: f1-strategy-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api
          image: f1-tire-energy-strategy:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: f1-strategy-config
          env:
            - name: F1_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: f1-strategy-secrets
                  key: redis-url
            - name: F1_MLFLOW_TRACKING_URI
              valueFrom:
                secretKeyRef:
                  name: f1-strategy-secrets
                  key: mlflow-uri
                  optional: true
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: artifacts
              mountPath: /artifacts
            - name: data
              mountPath: /data
      volumes:
        - name: artifacts
          persistentVolumeClaim:
            claimName: f1-strategy-artifacts
        - name: data
          persistentVolumeClaim:
            claimName: f1-strategy-data
