global:
  resolve_timeout: 5m
  # Configure SMTP for email alerts.
  smtp_smarthost: "smtp.example.com:587"
  smtp_from: "f1-alerts@example.com"
  smtp_auth_username: "f1-alerts@example.com"
  smtp_auth_password: "CHANGE_ME"
  smtp_require_tls: true

route:
  receiver: default
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: pagerduty
      repeat_interval: 30m
    - match:
        severity: warning
      receiver: default

receivers:
  - name: default
    email_configs:
      - to: "a.zevenstar@gmail.com"
        send_resolved: true
    slack_configs:
      - api_url: "https://hooks.slack.com/services/CHANGE_ME/CHANGE_ME/CHANGE_ME"
        channel: "#f1-alerts"
        send_resolved: true
        title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          {{ end }}

  - name: pagerduty
    email_configs:
      - to: "a.zevenstar@gmail.com"
        send_resolved: true
    slack_configs:
      - api_url: "https://hooks.slack.com/services/CHANGE_ME/CHANGE_ME/CHANGE_ME"
        channel: "#f1-oncall"
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: [alertname]
