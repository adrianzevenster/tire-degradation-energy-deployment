worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    gzip on;
    gzip_types application/json text/plain text/css;

    # Use Docker's internal DNS resolver; re-resolve every 30 s so recreated
    # containers are picked up without restarting nginx.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Redirect all HTTP to HTTPS.
    server {
        listen 80;
        server_name 167.233.125.215 _;
        return 301 https://$host$request_uri;
    }

    # HTTPS server.
    # Certs: place server.crt and server.key in monitoring/nginx/certs/ before first deploy.
    # Self-signed: openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
    #   -keyout monitoring/nginx/certs/server.key \
    #   -out monitoring/nginx/certs/server.crt \
    #   -subj "/CN=167.233.125.215"
    server {
        listen 443 ssl;
        server_name 167.233.125.215 _;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

        # F1 Strategy API — root
        location / {
            set $f1_api api:8000;
            proxy_pass         http://$f1_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # Grafana — served at /grafana/
        location /grafana/ {
            set $grafana_svc grafana:3000;
            proxy_pass         http://$grafana_svc/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # MLflow — served at /mlflow/
        location /mlflow/ {
            set $mlflow_svc mlflow:5000;
            proxy_pass         http://$mlflow_svc/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # /metrics restricted to loopback
        location /metrics {
            set $f1_api_metrics api:8000;
            proxy_pass         http://$f1_api_metrics/metrics;
            allow              127.0.0.1;
            deny               all;
        }
    }
}
